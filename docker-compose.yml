services:
  db:
    image: postgres:16
    container_name: tenorclone-db
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: tenorclone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  db_migrate:
    image: postgres:16
    depends_on:
      - db
    environment:
      PGPASSWORD: app
    volumes:
      - ./db/migrations:/migrations:ro
      - ./db/scripts:/scripts:ro
    entrypoint: ["/bin/bash", "/scripts/migrate.sh"]

volumes:
  pgdata: